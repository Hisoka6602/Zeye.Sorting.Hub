name: ef-migration-validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ef-migration-validation.yml"
      - "Zeye.Sorting.Hub.Domain/**"
      - "Zeye.Sorting.Hub.Infrastructure/**"
      - "Zeye.Sorting.Hub.Host/**"
      - "EFCore数据库迁移指南.md"

permissions:
  contents: read

env:
  MYSQL_ROOT_PASSWORD: "Admin@1234"
  MSSQL_SA_PASSWORD: "Admin@1234"

jobs:
  mysql-ef-validation:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: "zeye_sorting_hub_ci"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -pAdmin@1234 --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 9.0.14

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Validate EF migrations (list / update / script)
        env:
          MYSQL_CONNECTION: "server=127.0.0.1;port=3306;database=zeye_sorting_hub_ci;uid=root;pwd=${{ env.MYSQL_ROOT_PASSWORD }};SslMode=None;"
          ConnectionStrings__MySql: "server=127.0.0.1;port=3306;database=zeye_sorting_hub_ci;uid=root;pwd=${{ env.MYSQL_ROOT_PASSWORD }};SslMode=None;"
        run: |
          dotnet ef migrations list \
            --project Zeye.Sorting.Hub.Infrastructure \
            --startup-project Zeye.Sorting.Hub.Infrastructure \
            --context SortingHubDbContext \
            -- --provider MySql
          dotnet ef database update \
            --project Zeye.Sorting.Hub.Infrastructure \
            --startup-project Zeye.Sorting.Hub.Infrastructure \
            --context SortingHubDbContext \
            --connection "$MYSQL_CONNECTION" \
            -- --provider MySql
          dotnet ef migrations script \
            --project Zeye.Sorting.Hub.Infrastructure \
            --startup-project Zeye.Sorting.Hub.Infrastructure \
            --context SortingHubDbContext \
            --output /tmp/ef-migration-validation.sql \
            -- --provider MySql

  sqlserver-ef-validation:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ env.MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
        # mcr.microsoft.com/mssql/server:2022-latest 镜像内 sqlcmd 默认位于 /opt/mssql-tools18/bin/sqlcmd
        options: >-
          --health-cmd "SQLCMDPASSWORD=${MSSQL_SA_PASSWORD} /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -Q \"SELECT 1\" -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 9.0.14

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Validate EF migrations (list / update / script)
        env:
          SQLSERVER_CONNECTION: "Server=127.0.0.1,1433;Database=zeye_sorting_hub_ci;User Id=sa;Password=${{ env.MSSQL_SA_PASSWORD }};TrustServerCertificate=True;Encrypt=False;"
          ConnectionStrings__SqlServer: "Server=127.0.0.1,1433;Database=zeye_sorting_hub_ci;User Id=sa;Password=${{ env.MSSQL_SA_PASSWORD }};TrustServerCertificate=True;Encrypt=False;"
        run: |
          dotnet ef migrations list \
            --project Zeye.Sorting.Hub.Infrastructure \
            --startup-project Zeye.Sorting.Hub.Infrastructure \
            --context SortingHubDbContext \
            -- --provider SqlServer
          dotnet ef database update \
            --project Zeye.Sorting.Hub.Infrastructure \
            --startup-project Zeye.Sorting.Hub.Infrastructure \
            --context SortingHubDbContext \
            --connection "$SQLSERVER_CONNECTION" \
            -- --provider SqlServer
          dotnet ef migrations script \
            --project Zeye.Sorting.Hub.Infrastructure \
            --startup-project Zeye.Sorting.Hub.Infrastructure \
            --context SortingHubDbContext \
            --output /tmp/ef-migration-validation-sqlserver.sql \
            -- --provider SqlServer
