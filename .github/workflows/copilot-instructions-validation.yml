name: copilot-instructions-validation

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  validate-copilot-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Copilot instructions rules
        run: ./.github/scripts/validate-copilot-rules.sh
